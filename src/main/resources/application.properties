spring.application.name=flash-sale

# Datasource
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/flashsale}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:flashsale}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:secret}

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Redis
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}

# Scheduling
spring.task.scheduling.pool.size=2

# Actuator
management.endpoints.web.exposure.include=health,info,metrics

# OpenAPI
springdoc.swagger-ui.path=/swagger-ui.html

# Logging
logging.level.com.example.flash_sale=INFO

# Flash-sale tuning
flashsale.reservation.ttl-seconds=600
flashsale.sweeper.fixed-delay-ms=30000
flashsale.product.cache.ttl-seconds=600
flashsale.cart.ttl-seconds=604800
flashsale.idempotency.ttl-seconds=86400
