services:
  postgres:
    image: 'postgres:16'
    environment:
      - 'POSTGRES_DB=flashsale'
      - 'POSTGRES_PASSWORD=secret'
      - 'POSTGRES_USER=flashsale'
    ports:
      - '5433:5432'

  adminer:
    image: 'adminer:latest'
    depends_on:
      - postgres
    ports:
      - '8081:8080'

  redis:
    image: 'redis:7-alpine'
    ports:
      - '6379:6379'

  redisinsight:
    image: 'redis/redisinsight:latest'
    depends_on:
      - redis
    ports:
      - '5540:5540'
    volumes:
      - redisinsight:/data

volumes:
  redisinsight:
